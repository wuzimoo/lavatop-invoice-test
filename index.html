<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lava Monthly Checkout</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="badge">MVP Checkout</p>
        <h1>Monthly Subscription</h1>
        <p class="caption">Fixed billing cycle: every 1 month</p>

        <form id="checkout-form" class="form">
          <label>
            Email
            <input id="email" type="email" placeholder="you@email.com" required />
          </label>

          <label>
            Payment provider
            <select id="paymentProvider">
              <option value="">Auto (recommended)</option>
              <option value="UNLIMINT">UNLIMINT</option>
              <option value="STRIPE">STRIPE</option>
              <option value="PAYPAL">PAYPAL</option>
              <option value="SMART_GLOCAL">SMART_GLOCAL</option>
              <option value="PAY2ME">PAY2ME</option>
            </select>
          </label>

          <button id="pay-btn" type="submit">Pay Monthly</button>
        </form>

        <p id="checkout-result" class="result" aria-live="polite"></p>
      </section>

      <section class="card card-small">
        <h2>Webhook</h2>
        <p class="caption">URL for Lava: <code id="webhook-url"></code></p>
        <div class="row">
          <button id="test-webhook-btn" type="button" class="secondary">Send test event</button>
          <button id="refresh-webhooks-btn" type="button" class="ghost">Refresh</button>
        </div>
        <pre id="webhook-events">No webhook events yet.</pre>
      </section>
    </main>

    <script src="/script.js" type="module"></script>
  </body>
</html>
